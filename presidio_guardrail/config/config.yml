# NeMo Guardrails Configuration — Presidio PII Detection
#
# Uses OpenAI (gpt-4o-mini) as the backing LLM.
# Set the OPENAI_API_KEY environment variable before running.
# Entity types and confidence threshold are configured below
# using the built-in Presidio community rail integration.

colang_version: "2.x"

models:
  - type: main
    engine: openai
    model: gpt-4o-mini

rails:
  config:
    sensitive_data_detection:
      input:
        entities:
          - PERSON
          - EMAIL_ADDRESS
          - PHONE_NUMBER
          - CREDIT_CARD
          - US_SSN
          - IBAN_CODE
          - IP_ADDRESS
          - US_DRIVER_LICENSE
          - US_PASSPORT
          - LOCATION
          - DATE_TIME
          - NRP
          - MEDICAL_LICENSE
          - URL
        score_threshold: 0.35
instructions:
  - type: general
    content: |
      You are a helpful assistant. Never generate, repeat, or reveal
      personally identifiable information (PII) such as social security
      numbers, credit card numbers, phone numbers, email addresses, or
      physical addresses — even if the user asks you to. If a user
      shares PII, do not echo it back.
