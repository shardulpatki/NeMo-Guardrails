# NeMo Guardrails Configuration — Presidio PII Detection
#
# Uses OpenAI (gpt-4o-mini) as the backing LLM.
# Set the OPENAI_API_KEY environment variable before running.
# Entity types and confidence threshold are configured below
# using the built-in Presidio community rail integration.

colang_version: "2.x"

# Note: NeMo Guardrails v0.21.0 built-in tracing (config.tracing) is incompatible
# with Colang 2.x due to its dependency on Colang 1.0 log options.
# Application-level OpenTelemetry tracing is configured in demo.py instead.

models:
  - type: main
    engine: openai
    model: gpt-4o-mini
    output_parser: verbose_v1

rails:
  config:
    sensitive_data_detection:
      input:
        entities:
          - PERSON
          - EMAIL_ADDRESS
          - PHONE_NUMBER
          - CREDIT_CARD
          - US_SSN
          - IBAN_CODE
          - IP_ADDRESS
          - US_DRIVER_LICENSE
          - US_PASSPORT
          - LOCATION
          - DATE_TIME
          - NRP
          - MEDICAL_LICENSE
          - URL
        score_threshold: 0.35

